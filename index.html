<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>RSAC Translator 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0f;--sur:#111418;--card:#181c22;--brd:#252b35;
  --acc:#00d4aa;--blu:#0088ff;--orn:#ff6b35;
  --txt:#e8ecf0;--mut:#6b7685;--red:#ff4444;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,170,.012) 3px,rgba(0,212,170,.012) 4px);pointer-events:none;z-index:9999}
.app{max-width:440px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border:1px solid var(--brd);border-top:2px solid var(--acc);border-radius:12px}
.logo{display:flex;align-items:center;gap:9px}
.logo-ico{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--acc);letter-spacing:.05em}
.logo-sub{font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase}
.pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--mut);padding:4px 11px;background:var(--sur);border:1px solid var(--brd);border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mut);transition:.3s}
.dot.on{background:var(--acc);box-shadow:0 0 6px var(--acc);animation:bl 1.5s infinite}
.dot.load{background:var(--blu);box-shadow:0 0 6px var(--blu);animation:bl .4s infinite}
.dot.tts{background:var(--orn);box-shadow:0 0 6px var(--orn);animation:bl .6s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.alert{padding:9px 13px;border-radius:8px;font-size:12px;line-height:1.5;display:none}
.alert.show{display:block}
.alert.info{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);color:var(--acc)}
.alert.warn{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);color:var(--orn)}
.alert.err{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.lang-row{display:flex;height:50px;background:var(--card);border:1px solid var(--brd);border-radius:12px;overflow:hidden}
.lb{flex:1;border:none;background:none;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--mut);transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.lb.a-en{color:var(--blu);background:rgba(0,136,255,.1)}
.lb.a-es{color:var(--orn);background:rgba(255,107,53,.1)}
.swap{border:none;background:none;cursor:pointer;color:var(--mut);font-size:22px;padding:0 16px;border-left:1px solid var(--brd);border-right:1px solid var(--brd);transition:.2s;display:flex;align-items:center}
.swap:hover{color:var(--acc)}
.mic-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 16px 18px;background:var(--card);border:1px solid var(--brd);border-radius:16px;gap:12px;position:relative;overflow:hidden}
.mic-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,212,170,.07) 0%,transparent 70%);pointer-events:none}
.mic-btn{width:90px;height:90px;border-radius:50%;border:2px solid var(--brd);cursor:pointer;background:var(--sur);color:var(--mut);font-size:32px;display:flex;align-items:center;justify-content:center;transition:all .2s;outline:none;user-select:none;position:relative;z-index:1}
.mic-btn:active{transform:scale(.91)}
.mic-btn.on{background:rgba(0,212,170,.12);border-color:var(--acc);color:var(--acc);animation:rip 1.5s infinite}
.mic-btn.load{background:rgba(0,136,255,.10);border-color:var(--blu);color:var(--blu)}
@keyframes rip{0%{box-shadow:0 0 0 0 rgba(0,212,170,.55)}70%{box-shadow:0 0 0 24px rgba(0,212,170,0)}100%{box-shadow:0 0 0 0 rgba(0,212,170,0)}}
.mic-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);text-align:center}
.mic-lbl.on{color:var(--acc)}
.progress-ring{width:100%;display:flex;flex-direction:column;gap:4px}
.prog-bar{width:100%;height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;width:0%;transition:width .1s linear}
.prog-info{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--mut)}
.live{background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden}
.live-hdr{padding:5px 12px;background:var(--sur);border-bottom:1px solid var(--brd);font-family:var(--mono);font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:bl .9s infinite}
.live-txt{padding:10px 12px;font-size:13px;color:rgba(232,236,240,.6);font-style:italic;line-height:1.5;min-height:42px}
.results{background:var(--card);border:1px solid var(--brd);border-radius:12px;overflow:hidden}
.res-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;background:var(--sur);border-bottom:1px solid var(--brd)}
.res-title{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut)}
.clr{background:none;border:1px solid var(--brd);border-radius:5px;padding:3px 9px;color:var(--mut);font-family:var(--mono);font-size:9px;cursor:pointer;text-transform:uppercase;transition:.2s}
.clr:hover{border-color:var(--red);color:var(--red)}
.res-scroll{max-height:340px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.res-scroll::-webkit-scrollbar{width:3px}
.res-scroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.entry{padding:10px 12px;border-radius:8px;border:1px solid var(--brd);display:flex;flex-direction:column;gap:5px;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.entry.new-en{border-color:rgba(0,136,255,.4);background:rgba(0,136,255,.04)}
.entry.new-es{border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.04)}
.e-src{font-size:11px;color:var(--mut);font-style:italic;line-height:1.4}
.e-tgt{font-size:15px;color:var(--txt);font-weight:500;line-height:1.5}
.e-meta{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--mut)}
.badge{padding:1px 6px;border-radius:3px;font-size:8px;font-family:var(--mono);text-transform:uppercase}
.b-en{background:rgba(0,136,255,.12);color:var(--blu)}
.b-es{background:rgba(255,107,53,.12);color:var(--orn)}
.b-ai{background:rgba(0,212,170,.10);color:var(--acc)}
.spk{background:none;border:none;cursor:pointer;color:var(--mut);font-size:14px;padding:1px 4px;margin-left:auto;transition:.15s}
.spk:hover{color:var(--acc)}
.empty{text-align:center;padding:26px;font-size:12px;color:var(--mut);font-style:italic}
.ctrls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ctrl{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:12px}
.c-lbl{font-family:var(--mono);font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.trow{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--txt);margin-bottom:8px}
.trow:last-child{margin-bottom:0}
.tog{position:relative;width:34px;height:18px}
.tog input{opacity:0;width:0;height:0}
.track{position:absolute;inset:0;background:var(--brd);border-radius:9px;cursor:pointer;transition:.25s}
.track::before{content:'';position:absolute;width:12px;height:12px;left:3px;bottom:3px;background:var(--mut);border-radius:50%;transition:.25s}
.tog input:checked~.track{background:rgba(0,212,170,.4)}
.tog input:checked~.track::before{transform:translateX(16px);background:var(--acc)}
.rng{display:flex;flex-direction:column;gap:5px}
.rng input[type=range]{width:100%;accent-color:var(--acc);cursor:pointer}
.rng-row{display:flex;justify-content:space-between}
.rng-v{font-family:var(--mono);font-size:10px;color:var(--acc)}
.rng-k{font-size:10px;color:var(--mut)}
.rng-note{font-size:9px;color:var(--mut);line-height:1.4;margin-top:1px}
.key-row{display:flex;gap:6px;align-items:center}
.key-input{flex:1;background:var(--sur);border:1px solid var(--brd);border-radius:6px;padding:5px 8px;color:var(--txt);font-family:var(--mono);font-size:10px;outline:none}
.key-input:focus{border-color:var(--acc)}
.key-save{background:var(--acc);border:none;border-radius:6px;padding:5px 10px;color:#000;font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="logo">
      <div class="logo-ico">🛡</div>
      <div>
        <div class="logo-name">RSAC//TRANSLATE</div>
        <div class="logo-sub">2026 · Powered by Groq</div>
      </div>
    </div>
    <div class="pill"><div class="dot" id="dot"></div><span id="stxt">Listo</span></div>
  </div>

  <div class="alert" id="alert"></div>

  <!-- API KEY -->
  <div class="ctrl" id="keyPanel">
    <div class="c-lbl">Groq API Key</div>
    <div class="key-row">
      <input class="key-input" type="password" id="keyInput" placeholder="gsk_..." autocomplete="off">
      <button class="key-save" onclick="saveKey()">Guardar</button>
    </div>
  </div>

  <div class="lang-row">
    <button class="lb a-en" id="btnEN" onclick="setMode('en-es')">🇺🇸 EN → ES</button>
    <button class="swap" onclick="swapMode()">⇄</button>
    <button class="lb" id="btnES" onclick="setMode('es-en')">🇨🇱 ES → EN</button>
  </div>

  <div class="mic-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleListen()">🎙</button>
    <div class="mic-lbl" id="micLbl">Toca para comenzar</div>
    <div class="progress-ring">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-info">
        <span id="progLbl">Grabando chunk cada 5s</span>
        <span id="progSec"></span>
      </div>
    </div>
  </div>

  <div class="live">
    <div class="live-hdr"><div class="live-dot"></div>Transcripción en vivo</div>
    <div class="live-txt" id="liveTxt">Esperando audio…</div>
  </div>

  <div class="results">
    <div class="res-hdr">
      <span class="res-title">Traducciones</span>
      <button class="clr" onclick="clearAll()">Limpiar</button>
    </div>
    <div class="res-scroll" id="scroll">
      <div class="empty" id="empty">Las traducciones aparecerán aquí</div>
    </div>
  </div>

  <div class="ctrls">
    <div class="ctrl">
      <div class="c-lbl">Opciones</div>
      <div class="trow">
        <span>Audio 🔊</span>
        <label class="tog"><input type="checkbox" id="audOn"><div class="track"></div></label>
      </div>
      <div class="trow">
        <span>Overlap</span>
        <label class="tog"><input type="checkbox" id="overlapOn" checked><div class="track"></div></label>
      </div>
    </div>
    <div class="ctrl">
      <div class="c-lbl">Tamaño de chunk</div>
      <div class="rng">
        <input type="range" min="3" max="10" value="5" id="chunkSlider"
          oninput="chunkSec=+this.value;document.getElementById('chunkV').textContent=this.value+'s'">
        <div class="rng-row"><span class="rng-k">Duración:</span><span class="rng-v" id="chunkV">5s</span></div>
        <div class="rng-note">Audio enviado a Whisper cada N segundos.</div>
      </div>
    </div>
  </div>

</div>
<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
let GROQ_KEY  = '';
let mode      = 'en-es';
let chunkSec  = 5;
let listening = false;

// MediaRecorder state
let mediaStream    = null;
let mediaRecorder  = null;
let chunkTimer     = null;
let progTimer      = null;
let progStart      = 0;
let audioChunks    = [];

// Contexto para traducción — últimas frases para dar contexto a LLaMA
let contextBuffer  = [];
const MAX_CONTEXT  = 4;

// Sistema de prompt para LLaMA con contexto RSAC
const SYSTEM_PROMPT = `Eres un intérprete simultáneo profesional especializado en ciberseguridad.
Tu única tarea es traducir el texto que recibes al idioma indicado.

Reglas estrictas:
- Responde SOLO con la traducción, sin explicaciones ni comentarios
- Mantén términos técnicos en inglés cuando corresponda: CVE, APT, zero-day, ransomware, phishing, exploit, payload, SIEM, EDR, SOC, TTPs, MITRE ATT&CK, threat actor, lateral movement, etc.
- Si el texto es muy corto o ininteligible, responde con una traducción aproximada
- Preserva el tono y registro del orador
- Contexto: conferencia RSAC 2026 San Francisco sobre ciberseguridad`;

/* ════════════════════════════════════════
   API KEY
════════════════════════════════════════ */
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('gsk_')) {
    showAlert('La key debe empezar con gsk_', 'warn'); return;
  }
  GROQ_KEY = k;
  document.getElementById('keyPanel').style.display = 'none';
  showAlert('✓ API key guardada. Selecciona idioma y toca 🎙', 'info');
}

// Pre-cargar key si está disponible
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('groq_key');
  if (saved) {
    GROQ_KEY = saved;
    document.getElementById('keyInput').value = saved;
    document.getElementById('keyPanel').style.display = 'none';
    showAlert('Listo. Selecciona idioma y toca 🎙', 'info');
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    window.speechSynthesis.getVoices();
  }
});

/* ════════════════════════════════════════
   GROQ — WHISPER (transcripción)
════════════════════════════════════════ */
async function transcribeAudio(blob) {
  const srcLang = mode === 'en-es' ? 'en' : 'es';
  const fd = new FormData();
  fd.append('file', blob, 'audio.webm');
  fd.append('model', 'whisper-large-v3-turbo');
  fd.append('language', srcLang);
  fd.append('response_format', 'text');

  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + GROQ_KEY },
    body: fd
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error('Whisper error: ' + res.status + ' ' + err.substring(0, 100));
  }
  return (await res.text()).trim();
}

/* ════════════════════════════════════════
   GROQ — LLAMA 4 SCOUT (traducción)
════════════════════════════════════════ */
async function translateWithLlama(text) {
  const tgtLang = mode === 'en-es' ? 'español' : 'English';
  const ctx = contextBuffer.slice(-MAX_CONTEXT).join(' ');
  const userMsg = ctx
    ? `Contexto previo: "${ctx}"\n\nTraduce al ${tgtLang}: "${text}"`
    : `Traduce al ${tgtLang}: "${text}"`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + GROQ_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'meta-llama/llama-4-scout-17b-16e-instruct',
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user',   content: userMsg }
      ],
      max_tokens: 512,
      temperature: 0.1  // baja temperatura para traducciones consistentes
    })
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error('LLaMA error: ' + res.status + ' ' + err.substring(0, 100));
  }

  const data = await res.json();
  return data.choices[0].message.content.trim()
    .replace(/^["']|["']$/g, '')   // quitar comillas si el modelo las pone
    .trim();
}

/* ════════════════════════════════════════
   MEDIARECORDER — grabación en chunks
════════════════════════════════════════ */
async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        sampleRate: 16000
      }
    });
  } catch(e) {
    showAlert('No se pudo acceder al micrófono: ' + e.message, 'err');
    listening = false; setMic('off'); setLbl('Sin permiso', false);
    return;
  }

  recordChunk();
}

function recordChunk() {
  if (!listening) return;

  audioChunks = [];

  // Elegir formato soportado
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : MediaRecorder.isTypeSupported('audio/webm')
    ? 'audio/webm'
    : 'audio/ogg;codecs=opus';

  mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    if (!listening) return;
    const blob = new Blob(audioChunks, { type: mimeType });
    if (blob.size < 1000) {
      // Chunk demasiado pequeño — silencio, saltar
      if (listening) recordChunk();
      return;
    }
    await processChunk(blob);
    // Si overlap activo, iniciar siguiente chunk inmediatamente
    if (listening) recordChunk();
  };

  mediaRecorder.start();
  setDot('on'); setSt('Grabando'); setMic('on'); setLbl('Grabando…', true);

  // Barra de progreso
  progStart = Date.now();
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    const elapsed = (Date.now() - progStart) / 1000;
    const pct = Math.min((elapsed / chunkSec) * 100, 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progSec').textContent = elapsed.toFixed(1) + 's / ' + chunkSec + 's';
  }, 100);

  // Detener chunk después de chunkSec
  chunkTimer = setTimeout(() => {
    clearInterval(progTimer);
    document.getElementById('progFill').style.width = '100%';
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }, chunkSec * 1000);
}

async function processChunk(blob) {
  setDot('load'); setSt('Transcribiendo…'); setMic('load');

  try {
    // 1. Transcribir con Whisper
    const transcript = await transcribeAudio(blob);

    if (!transcript || transcript.length < 3) {
      if (listening) { setDot('on'); setSt('Grabando'); setMic('on'); }
      return;
    }

    // Mostrar transcripción en vivo
    document.getElementById('liveTxt').textContent = transcript;

    // 2. Traducir con LLaMA
    setSt('Traduciendo…');
    const translation = await translateWithLlama(transcript);

    // Actualizar contexto
    contextBuffer.push(transcript);
    if (contextBuffer.length > MAX_CONTEXT) contextBuffer.shift();

    // 3. Mostrar resultado
    addEntry(transcript, translation);

    // 4. TTS si está activo
    if (document.getElementById('audOn').checked) tts(translation);

  } catch(e) {
    console.error('processChunk error:', e);
    showAlert('Error: ' + e.message.substring(0, 80), 'warn');
  }

  if (listening) { setDot('on'); setSt('Grabando'); setMic('on'); }
}

function stopRecording() {
  clearTimeout(chunkTimer);
  clearInterval(progTimer);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch(e){}
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progSec').textContent = '';
}

/* ════════════════════════════════════════
   CONTROL PRINCIPAL
════════════════════════════════════════ */
function toggleListen() {
  if (listening) {
    listening = false;
    stopRecording();
    setDot(''); setSt('Listo'); setMic('off'); setLbl('Toca para comenzar', false);
    document.getElementById('liveTxt').textContent = 'Esperando audio…';
  } else {
    if (!GROQ_KEY) {
      showAlert('Primero ingresa tu Groq API key', 'warn');
      document.getElementById('keyPanel').style.display = 'block';
      return;
    }
    listening = true;
    startRecording();
  }
}

/* ════════════════════════════════════════
   TTS
════════════════════════════════════════ */
function tts(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u   = new SpeechSynthesisUtterance(text);
  const vcs = window.speechSynthesis.getVoices();
  if (mode === 'en-es') {
    u.voice = vcs.find(v=>v.lang==='es-MX')||vcs.find(v=>v.lang==='es-CL')||vcs.find(v=>v.lang==='es-AR')||vcs.find(v=>v.lang==='es-ES')||vcs.find(v=>v.lang.startsWith('es'))||null;
    u.lang  = u.voice ? u.voice.lang : 'es-MX';
    u.rate  = 1.05;
  } else {
    u.voice = vcs.find(v=>v.lang==='en-US')||vcs.find(v=>v.lang.startsWith('en'))||null;
    u.lang  = 'en-US'; u.rate = 1.05;
  }
  window.speechSynthesis.speak(u);
}

/* ════════════════════════════════════════
   UI
════════════════════════════════════════ */
function addEntry(src, tgt) {
  const el = document.getElementById('empty'); if(el) el.remove();
  const sc = document.getElementById('scroll');
  sc.querySelectorAll('.new-en,.new-es').forEach(e=>e.classList.remove('new-en','new-es'));
  const isEN = mode === 'en-es';
  const div  = document.createElement('div');
  div.className = 'entry '+(isEN?'new-en':'new-es');
  const ts  = new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const tQ  = tgt.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  div.innerHTML =
    '<div class="e-src">'+esc(src)+'</div>'+
    '<div class="e-tgt">'+esc(tgt)+'</div>'+
    '<div class="e-meta">'+
      '<span class="badge '+(isEN?'b-en':'b-es')+'">'+(isEN?'🇨🇱 ES':'🇺🇸 EN')+'</span>'+
      '<span class="badge b-ai">Groq ✦</span>'+
      '<span>'+ts+'</span>'+
      '<button class="spk" onclick="tts(\''+tQ+'\')">🔊</button>'+
    '</div>';
  sc.appendChild(div); sc.scrollTop=sc.scrollHeight;
}

function clearAll() {
  document.getElementById('scroll').innerHTML='<div class="empty" id="empty">Las traducciones aparecerán aquí</div>';
  contextBuffer = [];
}
function setDot(c){document.getElementById('dot').className='dot'+(c?' '+c:'');}
function setSt(t){document.getElementById('stxt').textContent=t;}
function setMic(s){
  const b=document.getElementById('micBtn');
  b.className='mic-btn'+(s==='on'?' on':s==='load'?' load':'');
  b.textContent=s==='load'?'⏳':'🎙';
}
function setLbl(t,on){const l=document.getElementById('micLbl');l.textContent=t;l.className='mic-lbl'+(on?' on':'');}
function showAlert(msg,type='info'){
  const b=document.getElementById('alert');
  b.className='alert show '+type; b.textContent=msg;
  if(type==='info') setTimeout(()=>b.classList.remove('show'),5000);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setMode(m){
  mode=m;
  document.getElementById('btnEN').className='lb'+(m==='en-es'?' a-en':'');
  document.getElementById('btnES').className='lb'+(m==='es-en'?' a-es':'');
  contextBuffer=[];
  if(listening){listening=false;stopRecording();setTimeout(()=>{listening=true;startRecording();},300);}
}
function swapMode(){setMode(mode==='en-es'?'es-en':'en-es');}
</script>
